query GetAccountDetail($id: ID!) {
  uiapi {
    query {
      Account(where: { Id: { eq: $id } }) {
        edges {
          node {
            Id
            Name @optional {
              value
              displayValue
            }
            Owner @optional {
              Name @optional {
                value
                displayValue
              }
            }
            Phone @optional {
              value
              displayValue
            }
            Fax @optional {
              value
              displayValue
            }
            Parent @optional {
              Name @optional {
                value
                displayValue
              }
            }
            Website @optional {
              value
              displayValue
            }
            Type @optional {
              value
              displayValue
            }
            NumberOfEmployees @optional {
              value
              displayValue
            }
            Industry @optional {
              value
              displayValue
            }
            AnnualRevenue @optional {
              value
              displayValue
            }
            Description @optional {
              value
              displayValue
            }
            BillingStreet @optional {
              value
              displayValue
            }
            BillingCity @optional {
              value
              displayValue
            }
            BillingState @optional {
              value
              displayValue
            }
            BillingPostalCode @optional {
              value
              displayValue
            }
            BillingCountry @optional {
              value
              displayValue
            }
            ShippingStreet @optional {
              value
              displayValue
            }
            ShippingCity @optional {
              value
              displayValue
            }
            ShippingState @optional {
              value
              displayValue
            }
            ShippingPostalCode @optional {
              value
              displayValue
            }
            ShippingCountry @optional {
              value
              displayValue
            }
            CreatedBy @optional {
              Name @optional {
                value
                displayValue
              }
            }
            CreatedDate @optional {
              value
              displayValue
            }
            LastModifiedBy @optional {
              Name @optional {
                value
                displayValue
              }
            }
            LastModifiedDate @optional {
              value
              displayValue
            }
          }
        }
      }
    }
  }
}
